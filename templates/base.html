{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Retail ERP{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('productSetupToggle');
        const itemsDiv = document.getElementById('productSetupItems');
        const arrow = toggleBtn.querySelector('.arrow');

        if (toggleBtn && itemsDiv) {
            toggleBtn.addEventListener('click', function() {
                const isVisible = itemsDiv.style.display !== 'none';
                if (isVisible) {
                    itemsDiv.style.display = 'none';
                    arrow.textContent = '▶';
                } else {
                    itemsDiv.style.display = 'block';
                    arrow.textContent = '▼';
                }
            });
        }
    });
</script>

<body>
    <div class="app">
        {% include "includes/sidebar.html" %}
        <div class="main">
            {% include "includes/topbar.html" %}
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
