{% extends "base.html" %}

{% block content %}
<h1>Delete Customer</h1>
<p>Are you sure you want to delete "{{ customer.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'customers:detail' customer.id %}">Cancel</a>
</form>
{% endblock %}
