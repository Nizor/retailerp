{% extends "base.html" %}

{% block content %}
<h1>{% if form.instance.pk %}Edit Supplier{% else %}Add New Supplier{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'suppliers:list' %}">Cancel</a>
</form>
{% endblock %}
