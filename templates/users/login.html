{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'users:register' %}">Register</a></p>
</div>
{% endblock %}
