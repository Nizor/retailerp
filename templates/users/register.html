{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'users:login' %}">Login</a></p>
</div>
{% endblock %}
