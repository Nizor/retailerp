{% extends "base.html" %}

{% block content %}
<h1>Delete Expense</h1>
<p>Are you sure you want to delete the expense: <strong>{{ expense.description }}</strong> ({{ expense.amount }})?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'expenses:list' %}">Cancel</a>
</form>
{% endblock %}
