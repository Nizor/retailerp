{% extends "base.html" %}

{% block content %}
<h1>{% if form.instance.pk %}Edit Category{% else %}Add Expense Category{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'expenses:category_list' %}">Cancel</a>
</form>
{% endblock %}
