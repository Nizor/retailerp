<div class="topbar">
    <div class="user-info">
        Welcome, {{ user.username }} ({{ user.profile.role }})
    </div>
    <div class="logout">
        <form method="post" action="{% url 'users:logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </div>
</div>
